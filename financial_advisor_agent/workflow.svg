<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 820" width="960" height="820" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="960" height="820" fill="#0d1117" rx="16"/>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" font-size="20" font-weight="bold" fill="#e6edf3">Autonomous Financial Advisor — Agent Workflow</text>
  <text x="480" y="64" text-anchor="middle" font-size="13" fill="#8b949e">GPT-4o · LangGraph ReAct Loop · LLM-as-a-Judge · Langfuse Tracing</text>

  <!-- ═══════════════════════════════════════════════
       ROW 1: User + FastAPI
  ════════════════════════════════════════════════ -->

  <!-- User -->
  <rect x="60" y="100" width="130" height="58" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="125" y="124" text-anchor="middle" font-size="22">👤</text>
  <text x="125" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#58a6ff">User Query</text>

  <!-- Arrow User → FastAPI -->
  <line x1="190" y1="129" x2="270" y2="129" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="230" y="121" text-anchor="middle" font-size="10" fill="#8b949e">POST /api/chat</text>

  <!-- FastAPI -->
  <rect x="270" y="100" width="150" height="58" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="345" y="122" text-anchor="middle" font-size="11" fill="#8b949e">FastAPI + SSE</text>
  <text x="345" y="141" text-anchor="middle" font-size="13" font-weight="bold" fill="#3fb950">🚀 Backend Server</text>
  <text x="345" y="154" text-anchor="middle" font-size="10" fill="#8b949e">Session · Portfolio ctx</text>

  <!-- Arrow FastAPI → Agent -->
  <line x1="420" y1="129" x2="500" y2="129" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="460" y="121" text-anchor="middle" font-size="10" fill="#8b949e">invoke graph</text>

  <!-- ═══════════════════════════════════════════════
       MAIN AGENT NODE
  ════════════════════════════════════════════════ -->
  <rect x="500" y="88" width="200" height="82" rx="12" fill="#1c2d3e" stroke="#58a6ff" stroke-width="2"/>
  <text x="600" y="108" text-anchor="middle" font-size="11" fill="#8b949e">NODE: financial_advisor</text>
  <text x="600" y="128" text-anchor="middle" font-size="15" font-weight="bold" fill="#58a6ff">🧠 GPT-4o Agent</text>
  <text x="600" y="147" text-anchor="middle" font-size="11" fill="#c9d1d9">11 Tools Bound</text>
  <text x="600" y="162" text-anchor="middle" font-size="10" fill="#8b949e">THINK → GATHER → REFLECT → ANSWER</text>

  <!-- ═══════════════════════════════════════════════
       CONDITIONAL ROUTING
  ════════════════════════════════════════════════ -->
  <!-- Diamond routing box -->
  <polygon points="600,230 650,270 600,310 550,270" fill="#21262d" stroke="#d29922" stroke-width="2"/>
  <text x="600" y="266" text-anchor="middle" font-size="11" fill="#d29922">tool_calls?</text>
  <text x="600" y="282" text-anchor="middle" font-size="10" fill="#8b949e">should_continue()</text>

  <!-- Arrow Agent → Diamond -->
  <line x1="600" y1="170" x2="600" y2="230" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- ═══════════════════════════════════════════════
       ROW 2: Tool Executor (YES path) + Judge (NO path)
  ════════════════════════════════════════════════ -->

  <!-- YES → tool_executor -->
  <line x1="550" y1="270" x2="360" y2="270" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="455" y="262" text-anchor="middle" font-size="10" fill="#3fb950">YES — has tool_calls</text>

  <rect x="200" y="242" width="160" height="56" rx="10" fill="#1b2b1b" stroke="#3fb950" stroke-width="1.5"/>
  <text x="280" y="262" text-anchor="middle" font-size="11" fill="#8b949e">NODE: tool_executor</text>
  <text x="280" y="281" text-anchor="middle" font-size="13" font-weight="bold" fill="#3fb950">⚙️ ToolNode</text>
  <text x="280" y="294" text-anchor="middle" font-size="10" fill="#8b949e">Executes LLM-chosen tools</text>

  <!-- Loop back arrow: tool_executor → Agent -->
  <path d="M280 242 Q280 185 500 175" fill="none" stroke="#3fb950" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-green)"/>
  <text x="360" y="200" text-anchor="middle" font-size="10" fill="#3fb950">loop back with results</text>

  <!-- NO → judge -->
  <line x1="650" y1="270" x2="760" y2="270" stroke="#f78166" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="705" y="262" text-anchor="middle" font-size="10" fill="#f78166">NO — final answer</text>

  <rect x="760" y="242" width="170" height="56" rx="10" fill="#2d1b1b" stroke="#f78166" stroke-width="1.5"/>
  <text x="845" y="262" text-anchor="middle" font-size="11" fill="#8b949e">NODE: response_judge</text>
  <text x="845" y="281" text-anchor="middle" font-size="13" font-weight="bold" fill="#f78166">⚖️ LLM-as-a-Judge</text>
  <text x="845" y="294" text-anchor="middle" font-size="10" fill="#8b949e">temp=0.1 · No tools bound</text>

  <!-- ═══════════════════════════════════════════════
       11 TOOLS PANEL
  ════════════════════════════════════════════════ -->
  <rect x="60" y="355" width="500" height="220" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="310" y="378" text-anchor="middle" font-size="13" font-weight="bold" fill="#e6edf3">🔧 11 Financial Tools (Data Access Layer)</text>

  <!-- Tools grid - col 1 -->
  <text x="80" y="402" font-size="11" fill="#58a6ff">think()</text>
  <text x="80" y="418" font-size="10" fill="#8b949e">Reasoning scratchpad · plan before calling data</text>

  <text x="80" y="438" font-size="11" fill="#58a6ff">list_portfolios()</text>
  <text x="80" y="454" font-size="10" fill="#8b949e">All portfolio IDs, users, risk profiles</text>

  <text x="80" y="474" font-size="11" fill="#58a6ff">get_portfolio_analysis(id)</text>
  <text x="80" y="490" font-size="10" fill="#8b949e">Holdings, P&amp;L, allocation, risk metrics</text>

  <text x="80" y="510" font-size="11" fill="#58a6ff">get_portfolio_risk(id)</text>
  <text x="80" y="526" font-size="10" fill="#8b949e">Beta, Sharpe, bearish sector alerts</text>

  <text x="80" y="546" font-size="11" fill="#58a6ff">get_market_overview()</text>
  <text x="80" y="562" font-size="10" fill="#8b949e">Indices, FII/DII, breadth, sector ranks</text>

  <!-- Tools grid - col 2 -->
  <text x="310" y="402" font-size="11" fill="#58a6ff">get_stock_details(symbol)</text>
  <text x="310" y="418" font-size="10" fill="#8b949e">Price, 52w range, news</text>

  <text x="310" y="438" font-size="11" fill="#58a6ff">get_sector_analysis(sector)</text>
  <text x="310" y="454" font-size="10" fill="#8b949e">Sector change, constituents, macro</text>

  <text x="310" y="474" font-size="11" fill="#58a6ff">search_news(sym, sector)</text>
  <text x="310" y="490" font-size="10" fill="#8b949e">Sentiment · impact · conflict_flag</text>

  <text x="310" y="510" font-size="11" fill="#58a6ff">get_top_movers(n)</text>
  <text x="310" y="526" font-size="10" fill="#8b949e">Top N gainers &amp; losers today</text>

  <text x="310" y="546" font-size="11" fill="#58a6ff">get_mutual_fund_details(code)</text>
  <text x="310" y="562" font-size="10" fill="#8b949e">NAV, returns, AUM, expense ratio</text>

  <text x="80" y="558" font-size="11" fill="#e6611a">build_causal_chain(id, sym)</text>
  <text x="80" y="572" font-size="10" fill="#e6611a">★ Macro→Sector→Stock→₹ P&amp;L chain</text>

  <!-- Connecting line: Agent ↔ Tools panel -->
  <line x1="500" y1="370" x2="600" y2="220" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="545" y="340" text-anchor="middle" font-size="9" fill="#8b949e">binds tools</text>

  <!-- ═══════════════════════════════════════════════
       JUDGE SCORES PANEL
  ════════════════════════════════════════════════ -->
  <rect x="580" y="355" width="350" height="220" rx="12" fill="#161b22" stroke="#f78166" stroke-width="1.5"/>
  <text x="755" y="378" text-anchor="middle" font-size="13" font-weight="bold" fill="#e6edf3">⚖️ Judge Scoring Rubric (6 Dimensions)</text>

  <text x="600" y="402" font-size="11" fill="#f78166">factual_grounding</text>
  <text x="600" y="416" font-size="10" fill="#8b949e">Exact ₹ values, %, named stocks cited?</text>

  <text x="600" y="436" font-size="11" fill="#f78166">causal_reasoning</text>
  <text x="600" y="450" font-size="10" fill="#8b949e">Explains WHY (chain), not just WHAT?</text>

  <text x="600" y="470" font-size="11" fill="#f78166">completeness</text>
  <text x="600" y="484" font-size="10" fill="#8b949e">Every part of the query answered?</text>

  <text x="600" y="504" font-size="11" fill="#f78166">actionability</text>
  <text x="600" y="518" font-size="10" fill="#8b949e">Concrete, implementable recommendations?</text>

  <text x="600" y="538" font-size="11" fill="#f78166">risk_awareness</text>
  <text x="600" y="552" font-size="10" fill="#8b949e">Critical risks proactively flagged?</text>

  <text x="600" y="572" font-size="11" fill="#f78166">conciseness</text>
  <text x="600" y="548" font-size="10" fill="#8b949e">Length appropriate for question?</text>

  <!-- Verdict badges -->
  <rect x="600" y="558" width="88" height="18" rx="9" fill="#1f6feb"/>
  <text x="644" y="571" text-anchor="middle" font-size="10" font-weight="bold" fill="white">EXCELLENT</text>
  <rect x="695" y="558" width="52" height="18" rx="9" fill="#196c2e"/>
  <text x="721" y="571" text-anchor="middle" font-size="10" font-weight="bold" fill="white">GOOD</text>
  <rect x="754" y="558" width="80" height="18" rx="9" fill="#9e6a03"/>
  <text x="794" y="571" text-anchor="middle" font-size="10" font-weight="bold" fill="white">ACCEPTABLE</text>
  <rect x="840" y="558" width="80" height="18" rx="9" fill="#6e1e1e"/>
  <text x="880" y="571" text-anchor="middle" font-size="10" font-weight="bold" fill="white">NEEDS WORK</text>

  <!-- ═══════════════════════════════════════════════
       LANGFUSE PANEL
  ════════════════════════════════════════════════ -->
  <rect x="60" y="605" width="500" height="150" rx="12" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="310" y="628" text-anchor="middle" font-size="13" font-weight="bold" fill="#bc8cff">🔭 Langfuse Observability (Optional Tracing)</text>

  <text x="80" y="652" font-size="11" fill="#bc8cff">CallbackHandler</text>
  <text x="80" y="666" font-size="10" fill="#8b949e">Single shared handler · injected into every graph.invoke() config</text>

  <text x="80" y="686" font-size="11" fill="#bc8cff">Per-Request Metadata</text>
  <text x="80" y="700" font-size="10" fill="#8b949e">langfuse_session_id · langfuse_user_id · tags: ["financial-advisor"]</text>

  <text x="80" y="720" font-size="11" fill="#bc8cff">Captured Automatically</text>
  <text x="80" y="734" font-size="10" fill="#8b949e">LLM prompts · completions · token usage · cost · node latency · model name</text>

  <text x="80" y="748" font-size="11" fill="#bc8cff">Enable via .env</text>
  <text x="80" y="738" font-size="10" fill="#8b949e">LANGFUSE_SECRET_KEY + LANGFUSE_PUBLIC_KEY → auto-disabled if absent</text>

  <!-- Langfuse arrows to nodes -->
  <line x1="310" y1="605" x2="600" y2="170" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-purple)"/>
  <text x="460" y="415" text-anchor="middle" font-size="9" fill="#bc8cff" transform="rotate(-58,460,415)">traces all nodes</text>

  <!-- ═══════════════════════════════════════════════
       SSE STREAM + FRONTEND
  ════════════════════════════════════════════════ -->
  <rect x="580" y="605" width="350" height="150" rx="12" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="755" y="628" text-anchor="middle" font-size="13" font-weight="bold" fill="#3fb950">📡 SSE Event Stream → Frontend</text>

  <text x="600" y="650" font-size="11" fill="#3fb950">node_start</text>
  <text x="680" y="650" font-size="10" fill="#8b949e">→ "🧠 Reasoning"</text>

  <text x="600" y="668" font-size="11" fill="#3fb950">tool_call</text>
  <text x="680" y="668" font-size="10" fill="#8b949e">→ "💭 Planning / 💼 Portfolio / 🔗 Causal"</text>

  <text x="600" y="686" font-size="11" fill="#3fb950">tool_done</text>
  <text x="680" y="686" font-size="10" fill="#8b949e">→ tool name + complete</text>

  <text x="600" y="704" font-size="11" fill="#3fb950">token × N</text>
  <text x="680" y="704" font-size="10" fill="#8b949e">→ streaming response tokens</text>

  <text x="600" y="722" font-size="11" fill="#f78166">judge_result</text>
  <text x="680" y="722" font-size="10" fill="#8b949e">→ scores · verdict · strengths · improvements</text>

  <text x="600" y="740" font-size="11" fill="#3fb950">done</text>
  <text x="680" y="740" font-size="10" fill="#8b949e">→ stream closed</text>

  <!-- Arrow judge → SSE -->
  <line x1="845" y1="298" x2="845" y2="605" stroke="#f78166" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="860" y="460" font-size="10" fill="#f78166">judge_result</text>
  <text x="860" y="474" font-size="10" fill="#f78166">SSE event</text>

  <!-- ═══════════════════════════════════════════════
       Arrow SSE → User (response back)
  ════════════════════════════════════════════════ -->
  <path d="M125 158 Q60 380 60 620 Q60 755 580 755" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-blue)"/>
  <text x="70" y="490" font-size="9" fill="#58a6ff" transform="rotate(90,70,490)">SSE stream back to browser</text>

  <!-- ═══════════════════════════════════════════════
       ARROW MARKERS
  ════════════════════════════════════════════════ -->
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f78166"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#bc8cff"/>
    </marker>
  </defs>

</svg>
